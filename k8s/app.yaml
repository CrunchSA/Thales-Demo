apiVersion: v1
kind: ServiceAccount
metadata:
  name: thales-demo-sa
---
apiVersion: v1
kind: Service
metadata:
  name: thales-demo-app
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3001
  selector:
    app: thales-demo-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thales-demo-app
spec:
  selector:
    matchLabels:
      app: thales-demo-app
  template:
    metadata:
      labels:
        app: thales-demo-app
    spec:
      serviceAccountName: thales-demo-sa
      containers:
      - name: app
        image: ghcr.io/crunchsa/thales-demo-app:latest
        ports:
        - containerPort: 3001
        env:
        - name: CM_URL
          valueFrom:
            configMapKeyRef:
              name: thales-config
              key: CM_URL
        - name: CM_TOKEN
          valueFrom:
            secretKeyRef:
              name: thales-secrets
              key: CM_TOKEN
        - name: CSM_ACCESS_ID
          valueFrom:
            secretKeyRef:
              name: thales-secrets
              key: CSM_ACCESS_ID
        - name: CSM_K8S_AUTH_CONFIG
          value: "k8s-auth-config" # Name of the K8s Auth config in CSM/Akeyless
        - name: DB_HOST
          value: "mysql-service"
        - name: DB_USER
          value: "root"
        - name: DB_NAME
          value: "thales_demo"
